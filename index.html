<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #fff1f2;
        color: #7f1d1d;
    }

    header {
        background-color: #b91c1c;
        color: #fee2e2;
        text-align: center;
        padding: 50px 20px;
    }

    .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 5px solid #fca5a5;
        object-fit: cover;
        margin-bottom: 15px;
    }

    nav {
        background: #991b1b;
        text-align: center;
        padding: 12px;
    }

    nav a {
        color: #fee2e2;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        color: #fecaca;
    }

    section {
        max-width: 800px;
        margin: 30px auto;
        padding: 25px;
        background: #ffffff;
        border-left: 6px solid #ef4444;
        border-radius: 8px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        transition: 0.2s;
    }

    section:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    h1, h2 {
        margin-bottom: 10px;
    }

    h2 {
        color: #b91c1c;
    }

    ul {
        padding-left: 20px;
    }

    footer {
        text-align: center;
        padding: 20px;
        background: #b91c1c;
        color: #fee2e2;
    }

    html {
        scroll-behavior: smooth;
    }
</style>
